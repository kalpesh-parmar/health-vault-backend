openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        deviceToken:
          type: string
          nullable: true

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
        otp:
          type: string

    ResetPasswordRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200": { description: Success }

  /auth/refresh-token:
    post:
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200": { description: Success }

  /auth/request-otp:
    post:
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200": { description: OTP sent }

  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200": { description: OTP sent }

  /auth/verify-otp:
    post:
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200": { description: Verified }

  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200": { description: Reset done }

  /auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200": { description: Logout success }
