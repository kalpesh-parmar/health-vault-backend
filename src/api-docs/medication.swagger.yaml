openapi: 3.0.0

info:
  title: Medication API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    UuidParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    MedicationType:
      type: string
      enum:
        - TABLET
        - CAPSULE
        - SYRUP
        - DROP
        - INJECTION

    FrequencyType:
      type: string
      enum:
        - ONCE_DAILY
        - TWICE_DAILY
        - THREE_TIMES_DAILY
        - AS_NEEDED

    FoodType:
      type: string
      enum:
        - WITH_FOOD
        - BEFORE_FOOD
        - AFTER_FOOD
        - EMPTY_STOMACH

    BestTakenType:
      type: string
      enum:
        - MORNING
        - AFTERNOON
        - EVENING
        - NIGHT

    CreateMedicationRequest:
      type: object

      required:
        - medicationName
        - medicationType
        - frequency
        - startDate

      properties:
        medicationName:
          type: string
          example: Paracetamol

        medicationType:
          $ref: "#/components/schemas/MedicationType"

        prescribedBy:
          type: string
          example: Dr. Smith

        dosePerIntake:
          type: string
          example: 500mg

        frequency:
          $ref: "#/components/schemas/FrequencyType"

        bestTaken:
          type: array
          items:
            $ref: "#/components/schemas/BestTakenType"

        withFood:
          $ref: "#/components/schemas/FoodType"

        startDate:
          type: string
          format: date
          example: 2026-05-08

        endDate:
          type: string
          format: date
          nullable: true
          example: 2026-06-01

        ongoing:
          type: boolean
          example: false

        pillsRemaining:
          type: integer
          example: 10

        doseReminders:
          type: boolean
          example: true

        refillAlert:
          type: boolean
          example: true

        notes:
          type: string
          example: Take after lunch

    UpdateMedicationRequest:
      type: object

      properties:
        medicationName:
          type: string

        medicationType:
          $ref: "#/components/schemas/MedicationType"

        prescribedBy:
          type: string

        dosePerIntake:
          type: string

        frequency:
          $ref: "#/components/schemas/FrequencyType"

        bestTaken:
          type: array
          items:
            $ref: "#/components/schemas/BestTakenType"

        withFood:
          $ref: "#/components/schemas/FoodType"

        startDate:
          type: string
          format: date

        endDate:
          type: string
          format: date
          nullable: true

        ongoing:
          type: boolean

        pillsRemaining:
          type: integer

        doseReminders:
          type: boolean

        refillAlert:
          type: boolean

        notes:
          type: string

    MedicationFilter:
      type: object

      properties:
        patientCode:
          type: string
          example: PAT001

        medicationType:
          $ref: "#/components/schemas/MedicationType"

        frequency:
          $ref: "#/components/schemas/FrequencyType"

        search:
          type: string
          example: para

    MedicationSort:
      type: object

      properties:
        sortBy:
          type: string
          enum:
            - medicationName
            - medicationType
            - frequency
            - startDate
            - createdAt
            - updatedAt

        sortOrder:
          type: string
          enum:
            - asc
            - desc

    MedicationPagination:
      type: object

      required:
        - pageNumber
        - pageLimit

      properties:
        pageNumber:
          type: integer
          minimum: 1
          example: 1

        pageLimit:
          type: integer
          minimum: 1
          maximum: 100
          example: 10

    ListMedicationRequest:
      type: object

      properties:
        filter:
          $ref: "#/components/schemas/MedicationFilter"

        sort:
          $ref: "#/components/schemas/MedicationSort"

    ListMedicationPaginatedRequest:
      type: object

      required:
        - page

      properties:
        filter:
          $ref: "#/components/schemas/MedicationFilter"

        sort:
          $ref: "#/components/schemas/MedicationSort"

        page:
          $ref: "#/components/schemas/MedicationPagination"

paths:
  /medications/create:
    post:
      tags:
        - Medication

      summary: Create medication

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationRequest"

      responses:
        "201":
          description: Medication created successfully

        "400":
          description: Bad request

        "401":
          description: Unauthorized

  /medications/{id}:
    get:
      tags:
        - Medication

      summary: Get medication by ID

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/UuidParam"

      responses:
        "200":
          description: Medication fetched successfully

    put:
      tags:
        - Medication

      summary: Update medication

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/UuidParam"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicationRequest"

      responses:
        "200":
          description: Medication updated successfully

    delete:
      tags:
        - Medication

      summary: Delete medication

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/UuidParam"

      responses:
        "200":
          description: Medication deleted successfully

  /medications/list:
    get:
      tags:
        - Medication

      summary: Get all medication list

      security:
        - bearerAuth: []

      responses:
        "200":
          description: Medication list fetched successfully

    post:
      tags:
        - Medication

      summary: Filter medication list

      security:
        - bearerAuth: []

      requestBody:
        required: false

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListMedicationRequest"

            examples:
              filterSearch:
                value:
                  filter:
                    search: TABLET

                  sort:
                    sortBy: createdAt
                    sortOrder: desc

      responses:
        "200":
          description: Filtered medication list

  /medications/list-paginated:
    post:
      tags:
        - Medication

      summary: Filter medication list with pagination

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListMedicationPaginatedRequest"

            examples:
              filterSortPagination:
                value:
                  filter:
                    medicationType: TABLET

                  sort:
                    sortBy: createdAt
                    sortOrder: desc

                  page:
                    pageNumber: 1
                    pageLimit: 10

      responses:
        "200":
          description: Paginated medication list
