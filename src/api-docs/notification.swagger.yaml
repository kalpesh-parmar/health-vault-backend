openapi: 3.0.0
info:
  title: Notification API
  version: 1.0.0

components:
  parameters:
    UuidParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    NotificationPayload:
      type: object
      additionalProperties: true
    TestSendNotificationRequest:
      type: object
      additionalProperties: false
      required: [userId]
      properties:
        userId:
          type: string
          example: user-123
        title:
          type: string
          example: Test notification
        body:
          type: string
          example: This is a test notification.
        data:
          nullable: true
          $ref: "#/components/schemas/NotificationPayload"
    NotificationFilter:
      type: object
      additionalProperties: false
      properties:
        userId:
          type: string
          example: user-123
        isRead:
          type: boolean
          example: false
        search:
          type: string
          example: appointment
    NotificationSort:
      type: object
      additionalProperties: false
      properties:
        sortBy:
          type: string
          enum: [createdAt, title]
          example: createdAt
        orderBy:
          type: string
          enum: [asc, desc]
          example: desc
    ListNotificationsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          $ref: "#/components/schemas/NotificationFilter"
        sort:
          $ref: "#/components/schemas/NotificationSort"
    ListNotificationsPaginatedRequest:
      type: object
      additionalProperties: false
      required: [page]
      properties:
        filter:
          $ref: "#/components/schemas/NotificationFilter"
        page:
          type: object
          additionalProperties: false
          required: [pageNumber, pageLimit]
          properties:
            pageNumber:
              type: integer
              minimum: 0
              example: 0
            pageLimit:
              type: integer
              minimum: 1
              maximum: 100
              example: 10
        sort:
          $ref: "#/components/schemas/NotificationSort"
    UserIdRequest:
      type: object
      additionalProperties: false
      required: [userId]
      properties:
        userId:
          type: string
          example: user-123

paths:
  /notifications/test-send:
    post:
      tags: [Notification]
      summary: Send test notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestSendNotificationRequest"
      responses:
        "200": { description: Notification sent }

  /notifications/list:
    post:
      tags: [Notification]
      summary: List notifications (filter + search + sort)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListNotificationsRequest"
            examples:
              list:
                value:
                  filter:
                    userId: user-123
                    isRead: false
                    search: appointment
                  sort:
                    sortBy: createdAt
                    orderBy: desc
      responses:
        "200": { description: Notifications fetched }

  /notifications/list-paginated:
    post:
      tags: [Notification]
      summary: List notifications (filter + search + sort + pagination)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListNotificationsPaginatedRequest"
            examples:
              paginated:
                value:
                  filter:
                    userId: user-123
                    isRead: false
                  page:
                    pageNumber: 0
                    pageLimit: 10
                  sort:
                    sortBy: createdAt
                    orderBy: desc
      responses:
        "200": { description: Notifications fetched }

  /notifications/mark-read/{id}:
    put:
      tags: [Notification]
      summary: Mark notification as read
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Notification marked as read }

  /notifications/mark-all-read:
    put:
      tags: [Notification]
      summary: Mark all notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserIdRequest"
      responses:
        "200": { description: All notifications marked as read }

  /notifications/{id}:
    delete:
      tags: [Notification]
      summary: Delete notification
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Notification deleted }

  /notifications/badge-count:
    get:
      tags: [Notification]
      summary: Get unread notification count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserIdRequest"
      responses:
        "200": { description: Badge count fetched }
