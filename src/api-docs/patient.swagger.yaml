openapi: 3.0.0
info:
  title: Patient API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    UuidParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreatePatientRequest:
      type: object
      required: [userName, fullName, email, password, gender, age, phone]
      properties:
        profileImageKey:
          type: string
          nullable: true
          description: S3 uploaded profile image file key
          example: profile_image/171637282-image.png
        userName: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        password: { type: string }
        gender:
          type: string
          enum: [female, male]
        age:
          type: integer
          minimum: 0
          maximum: 120
        # dateOfBirth:
        #   type: string
        #   format: date
        phone: { type: string }

    UpdatePatientRequest:
      type: object
      properties:
        profileImageKey:
          type: string
          nullable: true
          description: Optional profile picture upload
        userName: { type: string }
        firstName: { type: string }
        lastName: { type: string }

paths:
  /patient/add:
    post:
      tags: [Patient]
      security: []
      summary: Create patient
      description: Create patient using uploaded profile image fileKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"

      responses:
        "201":
          description: Patient created successfully

        "400":
          description: Invalid request

        "409":
          description: Email already exists
  /patient/list:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      responses:
        "200": { description: List }

  /patient/{id}:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Found }

    put:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200": { description: Updated }

  /patient/soft-delete/{id}:
    delete:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Deleted }

  /patient/hard-delete/{id}:
    delete:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Permanently deleted }

  /patient/profile:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      responses:
        "200": { description: Patient profile fetched }
