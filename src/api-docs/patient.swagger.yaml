openapi: 3.0.0
info:
  title: Patient API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    UuidParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreatePatientRequest:
      type: object
      required: [userName, fullName, email, password, gender, age, phone]
      properties:
        profilePicture:
          type: string
          format: binary
          nullable: true
          description: Optional profile picture upload
        userName: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        password: { type: string }
        gender:
          type: string
          enum: [female, male]
        age:
          type: integer
          minimum: 0
          maximum: 120
        # dateOfBirth:
        #   type: string
        #   format: date
        phone: { type: string }

    UpdatePatientRequest:
      type: object
      properties:
        profilePicture:
          type: string
          format: binary
          nullable: true
          description: Optional profile picture upload
        userName: { type: string }
        firstName: { type: string }
        lastName: { type: string }

paths:
  /patient/add:
    post:
      tags: [Patient]
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object

              required:
                - userName
                - firstName
                - lastName
                - email
                - password
                - gender
                - age
                - phone

              properties:
                profilePicture:
                  type: string
                  format: binary
                  description: Optional profile picture upload

                userName:
                  type: string

                firstName:
                  type: string

                lastName:
                  type: string

                email:
                  type: string

                password:
                  type: string

                gender:
                  type: string
                  enum: [female, male]

                age:
                  type: integer
                  minimum: 0
                  maximum: 120

                phone:
                  type: string

      responses:
        "201":
          description: Created

  /patient/list:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      responses:
        "200": { description: List }

  /patient/{id}:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Found }

    put:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200": { description: Updated }

  /patient/soft-delete/{id}:
    delete:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Deleted }

  /patient/hard-delete/{id}:
    delete:
      tags: [Patient]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidParam"
      responses:
        "200": { description: Permanently deleted }

  /patient/profile:
    get:
      tags: [Patient]
      security:
        - bearerAuth: []
      responses:
        "200": { description: Patient profile fetched }
