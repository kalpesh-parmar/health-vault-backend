paths:
  /session:
    post:
      summary: Create session (Login)
      tags:
        - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: your_jwt_token_here
      responses:
        201:
          description: Session created successfully

  /session/{id}:
    get:
      summary: Get session by ID
      tags:
        - Session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Session fetched successfully
        404:
          description: Session not found

  /session/logout:
    post:
      summary: Logout session
      tags:
        - Session
      responses:
        200:
          description: Logout successful
        404:
          description: Session not found