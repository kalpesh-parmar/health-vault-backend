paths:
  /session:
    post:
      summary: Create session (Login)
      tags:
        - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: integer
                  example: 1
      responses:
        201:
          description: Session created successfully

  /session/{id}:
    get:
      summary: Get session by ID
      tags:
        - Session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Session fetched successfully
        404:
          description: Session not found

  /session/logout:
    post:
      summary: Logout session
      tags:
        - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
              properties:
                sessionId:
                  type: integer
                  example: 1
      responses:
        200:
          description: Logout successful
        404:
          description: Session not found
