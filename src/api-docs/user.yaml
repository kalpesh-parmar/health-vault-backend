paths:
  /user/add:
    post:
      summary: Create user (Sign Up)
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - email
                - password
              properties:
                userName:
                  type: string
                  example: "Abcpqr"
                email:
                  type: string
                  example: "abc@gmail.com"
                password:
                  type: string
                  example: "S1234@abc"
      responses:
        201:
          description: User created successfully

  /user/login:
    post:
      summary: Login user
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "abc@gmail.com"
                password:
                  type: string
                  example: "S1234@abc"
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /user/list:
    get:
      summary: Get all users
      tags:
        - User
      responses:
        200:
          description: User list fetched successfully

  /user/{id}:
    get:
      summary: Get user by ID
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User fetched successfully
        404:
          description: User not found

    put:
      summary: Update user
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                  example: "UpdatedName"
                email:
                  type: string
                  example: "updated@gmail.com"
                password:
                  type: string
                  example: "NewPassword123"
      responses:
        200:
          description: User updated successfully
        404:
          description: User not found

    delete:
      summary: Delete user (Soft Delete)
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User deleted successfully
        404:
          description: User not found
