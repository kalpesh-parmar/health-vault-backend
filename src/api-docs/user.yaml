paths:
  /user/add:
    post:
      security: []
      summary: Create user (Sign Up)
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - fullName
                - email
                - password
                - gender
                - dateOfBirth
                - phoneNo
              properties:
                userName:
                  type: varchar
                  example: "Abcpqr"
                fullName:
                  type: varchar
                  example: "Abc Pqr Xyz"
                email:
                  type: varchar
                  example: "Abcd1@gmail.com"
                password:
                  type: varchar
                  example: "S1234@abc"
                gender:
                  type: string
                  example: "male/female"
                dateOfBirth:
                  type: date
                  example: "2006-01-31"
                phone:
                  type: string
                  example: "1234567890"

      responses:
        201:
          description: User created successfully

  /user/login:
    post:
      summary: Login user
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "abc@gmail.com"
                password:
                  type: string
                  example: "S1234@abc"
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /user/list:
    get:
      summary: Get all users
      tags:
        - User
      responses:
        200:
          description: User list fetched successfully

  /user/{id}:
    get:
      summary: Get user by ID
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User fetched successfully
        404:
          description: User not found

    put:
      summary: Update user
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                  example: "UpdatedName"
                fullName:
                  type: string
                  example: "Abc Pqr Xyz"
                email:
                  type: string
                  example: "updated@gmail.com"
                password:
                  type: string
                  example: "NewPassword123"
                gender:
                  type: string
                  example: "male/female"
                dateOfBirth:
                  type: date
                  example: "2006-01-31"
                phone:
                  type: string
                  example: "1234567890"
      responses:
        200:
          description: User updated successfully
        404:
          description: User not found

    delete:
      summary: Delete user (Soft Delete)
      tags:
        - User
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User deleted successfully
        404:
          description: User not found