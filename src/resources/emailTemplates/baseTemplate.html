<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{appName}}</title>
  </head>
  <body
    style="
      margin: 0;
      background: #f4f7fb;
      font-family: Arial, Helvetica, sans-serif;
      color: #172033;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f4f7fb; padding: 32px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 640px;
              background: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              border: 1px solid #e5eaf2;
            "
          >
            <tr>
              <td align="center" style="padding: 28px 24px 18px">
                <div
                  style="
                    width: 56px;
                    height: 56px;
                    border-radius: 50%;
                    background: #0f766e;
                    color: #ffffff;
                    font-size: 22px;
                    font-weight: 700;
                    line-height: 56px;
                    text-align: center;
                  "
                >
                  HV
                </div>
                <h1 style="margin: 16px 0 0; font-size: 22px; line-height: 30px; color: #172033">
                  {{appName}}
                </h1>
              </td>
            </tr>
            <tr>
              <td
                style="padding: 8px 32px 32px; font-size: 15px; line-height: 24px; color: #344054"
              >
                {{{content}}}
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 20px 32px;
                  background: #f8fafc;
                  font-size: 12px;
                  line-height: 18px;
                  color: #667085;
                  text-align: center;
                "
              >
                This is an automated Health Vault notification. Please do not reply to this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
