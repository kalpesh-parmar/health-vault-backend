<p style="margin: 0 0 16px">Hi {{name}},</p>
<p style="margin: 0 0 16px">{{message}}</p>
<p style="margin: 0 0 16px">Use this OTP to reset your password:</p>
<div
  style="
    margin: 24px 0;
    padding: 16px;
    border-radius: 8px;
    background: #ecfdf3;
    color: #065f46;
    font-size: 28px;
    line-height: 34px;
    font-weight: 700;
    letter-spacing: 6px;
    text-align: center;
  "
>
  {{otp}}
</div>
<p style="margin: 0">If you did not request this, secure your account immediately.</p>
